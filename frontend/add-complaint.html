<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Complaint - Complaint Registration Platform</title>
  <meta name="description" content="Submit a new complaint using our simple form.">
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">ComplaintPortal</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="add-complaint.html" class="active">Add Complaint</a>
      </div>
    </div>
  </nav>

  <main class="main-content">
    <div class="form-container">
      <h1 class="page-title">Submit a New Complaint</h1>
      
      <div id="messageBox" class="message-box message-success"></div>

      <form id="complaintForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
          <label for="city">City</label>
          <input type="text" id="city" name="city" placeholder="Enter your city" required>
        </div>

        <div class="form-group">
          <label for="mobile">Mobile Number</label>
          <input type="tel" id="mobile" name="mobile" placeholder="Enter your mobile number" required>
        </div>

        <div class="form-group">
          <label for="complaint">Complaint Details</label>
          <textarea id="complaint" name="complaint" rows="5" placeholder="Describe your complaint in detail..." required></textarea>
        </div>

        <div class="form-actions">
          <button type="submit">Submit Complaint</button>
          <button type="reset">Reset Form</button>
        </div>
      </form>
    </div>
  </main>

  <footer class="footer">
    <p>&copy; 2026 Complaint Registration Platform. All rights reserved.</p>
  </footer>

</body>
</html>
