<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Complaint - Complaint Registration Platform</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js" defer></script>
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">GovPortal</a>
      <div class="nav-links" id="navLinks">
        <!-- Dynamically injected -->
      </div>
    </div>
  </nav>

  <main class="main-content">
    <div class="title-container">
      <h1 class="page-title">Register New Complaint</h1>
    </div>

    <div class="form-container">
      <form id="complaintForm">
        <div class="form-group">
          <label for="name">Complainant Name</label>
          <input type="text" id="name" name="name" required placeholder="Enter your name">
        </div>
        <div class="form-group">
          <label for="city">City / District</label>
          <input type="text" id="city" name="city" required placeholder="Enter your city">
        </div>
        <div class="form-group">
          <label for="mobile">Mobile Number</label>
          <input type="tel" id="mobile" name="mobile" required placeholder="Enter 10-digit mobile number">
        </div>
        <div class="form-group">
          <label for="complaint">Complaint Details</label>
          <textarea id="complaint" name="complaint" rows="5" required placeholder="Describe your grievance in detail..."></textarea>
        </div>
        <div style="display: flex; gap: 1rem;">
          <button type="submit">Submit Complaint</button>
          <button type="reset" class="secondary-btn">Reset</button>
        </div>
      </form>
    </div>
  </main>

  <footer class="footer">
    <p>&copy; 2026 National Grievance Portal. For public service.</p>
  </footer>

</body>
</html>
